<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cores</title>
    <style>
        .square {
            border: solid 1px rgb(248, 72, 72);
            width: 150px;
            height: 150px;
            position: absolute;
            left: 40%;
            top: 40%;
            z-index: 1;
            background-color: rgba(255, 225, 0, 0.5);
            /* O último o rgba indica transparência*/
        }
        .square2 {
            width: 150px;
            height: 150px;
            position: absolute;
            left: 40%;
            right: 40%;
            z-index: 1;
            background-color: hsl(240, 50%, 60%, 0.9);
        }
    </style>
</head>
<body>
    <div class="square"></div>
    <div class="square2"></div>
</body>
</html>
