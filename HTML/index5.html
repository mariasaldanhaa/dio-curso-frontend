<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Cadastro</title>
</head>
<body>
    <form name="signup" onsubmit="alert('Formulário enviado!')" autocomplete="on" method="post" action="#">
        <!--o action define para onde os dados de um formulário são enviados-->
        <!--o method define como esses dados são enviados-->
        <!--method post: os dados são enviados no corpo da requisição HTTP,
        tornando-os invisíveis na URL -->
        <!--method get: os dados são anexados ao final da URL(após um ?)-->
        <!--o autocomplete permite o usuário completar com os dados já salvos no navegador-->
        <!--on: evento-->
        Nome: <input type="text" name="name"/><br/>
        Idade: <input type="number" name="age"/><br/>
        Senha: <input type="password" name="password"/><br/>
        <button type="submit">Enviar</button>
    </form>
</body>
</html>
