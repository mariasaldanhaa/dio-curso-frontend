<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <label>Text:</label>
        <input type="text" />
        <br/>

        <label>Number:</label>
        <input type="number" min="0" step="5" max="99"/>
        <!-- -->
        <!-- -->
        <!-- -->
        <br/>

        <label>Button:</label>
        <input type="button" value="Enviar">
        <br/>

        <label>Range:</label>
        <input type="range" min="0" max="5">
        <br/>

        <label>Color:</label>
        <input type="color">
        <br/>

        <label>Email:</label>
        <input type="email">
        <br/>   

        <label>URL:</label>
        <input type="url">
        <br/>

        <label>Date:</label>
        <input type="date">
        <br/>

        <label>Week:</label>
        <input type="week"> <!--Em alguns navegadores não funciona-->
        <br/>

        <label>Month:</label>
        <input type="month"> <!--Em alguns navegadores não funciona-->
        <br/>

        <label>Checkbox:</label>
        <input type="checkbox">
        <br/>

        <label>Radio:</label>
        <input type="radio">
        <br/>

        <label>Hidden:</label>
        <input type="hidden">
        <br/> <!--cria um campo de formulário invisível para o usuário, 
        mas que envia dados ao servidor durante a submissão-->

        <label>File:</label>
        <input type="file" multiple>
        <!-- o multiple permite que o usuário seleciona vários arquivos-->
        <!-- sem o multiple permite que o usuário seleciona apenas um arquivo-->
        <br/>

        <label>Search:</label>
        <input type="search">
        <br/>
    </form>
</body>
</html>
