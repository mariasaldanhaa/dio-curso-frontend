<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terceiro HTML</title>
</head>
<body>
    <ol> <!--a tag ol corresponde a uma lista ordenada que não funciona sozinha, ou seja, ela é uma tag pai-->
        <li>Item 1</li> <!--lista ordenada-->
        <li>Item 2</li>
        <li>Item 3</li>
        <li>
            <ol>
                <li>Item 3.1</li>
                <li>Item 3.2</li>
                <li>Item 3.3</li>
            </ol>
        </li>
    </ol>

    <ul> <!--Lista não ordenada-->
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>
</body>
</html>
